apiVersion: v1
kind: Service
metadata:
  name: automata-core-nodeport
  labels:
    app.kubernetes.io/instance: automata
    app.kubernetes.io/name: automata
spec:
  type: NodePort
  ports:
    - name: http
      nodePort: 30080
      port: 4000
      targetPort: 4000
      protocol: TCP
  selector:
    app.kubernetes.io/instance: automata
    app.kubernetes.io/name: automata