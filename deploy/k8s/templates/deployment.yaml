apiVersion: apps/v1
kind: Deployment
metadata:
  name: automata-core
  labels:
    {{- include "automata.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "automata.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "automata.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "automata.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              sleep 5
              echo "Running migrations..."
              cd /app
              MIX_ENV=prod mix ecto.migrate || echo "Migrations may already be applied"
              echo "Migrations complete"
          env:
            - name: DATABASE_URL
              value: {{ printf "ecto://%s:%s@%s-postgres:5432/automata" .Values.postgresql.auth.username .Values.postgresql.auth.password (include "automata.fullname" .) | quote }}
            - name: MIX_ENV
              value: "prod"
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            - name: DATABASE_URL
              value: {{ printf "ecto://%s:%s@%s-postgres:5432/automata" .Values.postgresql.auth.username .Values.postgresql.auth.password (include "automata.fullname" .) | quote }}
            - name: TEMPORAL_ADDRESS
              value: {{ printf "%s-temporal:7233" (include "automata.fullname" .) | quote }}
            - name: MATRIX_HOMESERVER_URL
              value: {{ printf "http://%s-matrix:8008" (include "automata.fullname" .) | quote }}
            - name: MATRIX_ADAPTER
              value: "synapse"
            - name: MATRIX_URL
              value: {{ printf "http://%s-matrix:8008" (include "automata.fullname" .) | quote }}
            - name: MATRIX_HOMESERVER_DOMAIN
              value: {{ .Values.matrix.serverName | default "matrix.example.com" | quote }}
            {{- range $key, $val := .Values.env }}
            {{- if and (ne $key "DATABASE_URL") (ne $key "TEMPORAL_ADDRESS") }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            {{- end }}
            - name: RELEASE_NODE
              value: "{{ template "automata.fullname" . }}@$(POD_IP)"
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.volumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
